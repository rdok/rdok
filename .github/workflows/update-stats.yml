name: Update Stats Cards

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Fetch stats cards
        run: |
          mkdir -p stats
          BASE="https://github-readme-stats.vercel.app"
          COMMON="username=rdok&theme=gruvbox"

          curl -sf \
            "${BASE}/api?${COMMON}&show_icons=true&count_private=true" \
            -o stats/github-stats.svg

          curl -sf \
            "${BASE}/api/top-langs?${COMMON}&layout=compact&langs_count=8&card_width=467" \
            -o stats/top-langs.svg

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/
          git diff --staged --quiet || (git commit -m "chore: update stats cards" && git push)
