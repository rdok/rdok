name: Update Stats Cards

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats cards
        run: |
          curl -sf "https://github-readme-stats.vercel.app/api?username=rdok&theme=gruvbox&show_icons=true&count_private=true&include_all_commits=true" -o stats/github-stats.svg
          curl -sf "https://github-readme-stats.vercel.app/api/top-langs?username=rdok&theme=gruvbox&layout=compact&langs_count=15" -o stats/top-langs.svg

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/
          git diff --staged --quiet || (git commit -m "chore: update stats cards" && git push)
